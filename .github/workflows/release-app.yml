# Builds Bonk.app on macOS, packages it as a .dmg, and publishes a GitHub
# Release tagged with the version shown in the app (CFBundleShortVersionString).
# Runs on every push to main that touches app/**, or manually.
#
# Bump the version in app/build.sh (CFBundleShortVersionString / CFBundleVersion)
# to cut a new release tag; pushing app changes without bumping updates the DMG
# on the existing version's release.
#
# Note: the app is ad-hoc signed (no paid Apple Developer ID), so the DMG is not
# notarized — on first launch macOS blocks it and users have to allow it via
# System Settings > Privacy & Security > "Open Anyway" (the old right-click >
# Open bypass was removed in macOS Sequoia).

name: Release app

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-app
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # volledige historie + tags nodig voor de changelog

      - name: Toolchain info
        run: swift --version

      - name: Run tests
        run: swift test --package-path app   # rode tests blokkeren de release

      - name: Build Bonk.app
        run: ./app/build.sh          # CI=true → assembles the bundle, no install/launch

      - name: Read app version
        id: ver
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" app/Bonk.app/Contents/Info.plist)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "App version: $V"

      - name: Package DMG
        run: |
          V='${{ steps.ver.outputs.version }}'
          rm -rf dmg && mkdir dmg
          cp -R app/Bonk.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "Bonk $V" -srcfolder dmg -ov -format UDZO "Bonk-$V.dmg"
          ls -lh "Bonk-$V.dmg"

      - name: Publish GitHub Release
        run: |
          V='${{ steps.ver.outputs.version }}'
          TAG="v$V"

          # Changelog: alle commits sinds de vorige release-tag (sluit de huidige
          # tag uit voor het geval we een bestaande release bijwerken).
          PREV=$(git tag --sort=-creatordate | grep -vx "$TAG" | head -1)
          if [ -n "$PREV" ]; then
            CHANGES=$(git log --no-merges --pretty='- %s' "$PREV"..HEAD)
            CHANGE_HEADER="## Changes since $PREV"
          else
            CHANGES=$(git log --no-merges --pretty='- %s' -20)
            CHANGE_HEADER="## Changes"
          fi
          [ -z "$CHANGES" ] && CHANGES="- (no individual changes)"

          NOTES="$CHANGE_HEADER
          $CHANGES

          ---
          > **HOW TO INSTALL**
          >
          > Download \`Bonk-$V.dmg\` below, open the DMG and drag Bonk to Applications. Bonk is ad-hoc signed (no paid Apple Developer account), so macOS can't verify it. The first time you open it, macOS will block it: go to **System Settings → Privacy & Security**, scroll down to the message about Bonk and click **Open Anyway**, then confirm. (Only needed once.) See [Apple's guide](https://support.apple.com/en-us/guide/mac-help/mh40616/mac) if you get stuck."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating asset."
            gh release upload "$TAG" "Bonk-$V.dmg" --clobber
            gh release edit "$TAG" --title "Bonk $V" --notes "$NOTES" --latest
          else
            echo "Creating release $TAG."
            gh release create "$TAG" "Bonk-$V.dmg" --title "Bonk $V" --notes "$NOTES" --latest
          fi
